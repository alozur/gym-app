services:
  backend:
    build: ./backend
    container_name: gym-backend-${ENV:-prod}
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_shared:5432/${POSTGRES_DB}?ssl=disable
      - CORS_ORIGINS=${CORS_ORIGINS:-https://gym.zurera.cloud,http://localhost:3080}
      - DEV_USER_EMAIL=${DEV_USER_EMAIL:-}
    networks:
      - gym-net
      - postgres_infra_network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: gym-frontend-${ENV:-prod}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3080}:80"
    depends_on:
      - backend
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-true}"
      - "traefik.http.routers.gym-${ENV:-prod}.rule=Host(`gym.${DOMAIN:-zurera.cloud}`)"
      - "traefik.http.routers.gym-${ENV:-prod}.entrypoints=web"
      - "traefik.http.routers.gym-${ENV:-prod}.middlewares=authelia@docker"
      - "traefik.http.services.gym-${ENV:-prod}.loadbalancer.server.port=80"
    networks:
      - gym-net
      - traefik-net

networks:
  gym-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET:-172.27.0.0/16}
          gateway: ${GATEWAY:-172.27.0.1}
  postgres_infra_network:
    external: true
  traefik-net:
    external: true
