server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API requests → backend (forward Authelia headers)
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Remote-User $http_remote_user;
        proxy_set_header Remote-Email $http_remote_email;
        proxy_set_header Remote-Name $http_remote_name;
        proxy_set_header Remote-Groups $http_remote_groups;
    }

    # Health check
    location /health {
        proxy_pass http://backend:8000/health;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker files — must not be cached
    location ~* (sw\.js|workbox-[^/]+\.js|registerSW\.js)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # PWA manifest — correct MIME type
    location ~* \.webmanifest$ {
        types { application/manifest+json webmanifest; }
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
